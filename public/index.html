<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <title>Orario AI E311PV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);

      --space-2: .5rem;
      --space-3: .75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-12: 3rem;

      --color-bg:#0f1113;
      --color-surface:#16181b;
      --color-surface-2:#191b20;
      --color-border:#32353d;
      --color-divider:#25272d;

      --color-text:#f5f5f6;
      --color-text-muted:#a3a5ad;
      --color-text-faint:#6b6e78;

      --color-primary:#4cc3c7;
      --color-primary-hover:#32a5aa;
      --color-primary-highlight:#23363a;

      --color-error:#f973af;

      --radius-md:.5rem;
      --radius-lg:.75rem;
      --radius-xl:1rem;
      --radius-full:9999px;

      --shadow-sm:0 1px 2px rgba(0,0,0,.4);
      --shadow-md:0 16px 40px rgba(0,0,0,.6);

      --transition:180ms cubic-bezier(.16,1,.3,1);

      --font-body:"Satoshi",system-ui,sans-serif;

      --content:1100px;
    }

    [data-theme="light-ui"] {
      --color-bg:#f7f6f2;
      --color-surface:#f9f8f5;
      --color-surface-2:#fbfbf9;
      --color-border:#d4d1ca;
      --color-divider:#dcd9d5;

      --color-text:#28251d;
      --color-text-muted:#6d6b66;
      --color-text-faint:#9b9992;

      --color-primary:#01696f;
      --color-primary-hover:#0c4e54;
      --color-primary-highlight:#cedcd8;

      --color-error:#a12c7b;

      --shadow-sm:0 1px 2px rgba(40,37,29,.06);
      --shadow-md:0 8px 24px rgba(40,37,29,.08);
    }

    *{box-sizing:border-box;}
    body{
      margin:0;
      min-height:100vh;
      font-family:var(--font-body);
      font-size:var(--text-base);
      line-height:1.6;
      color:var(--color-text);
      background:
        radial-gradient(circle at top left,rgba(76,195,199,.18),transparent 45%),
        var(--color-bg);
    }
    button,input{font:inherit;}

    .app{
      max-width:var(--content);
      margin:0 auto;
      padding:var(--space-6) var(--space-4) var(--space-12);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      gap:var(--space-4);
      align-items:center;
      margin-bottom:var(--space-8);
    }

    .brand{display:flex;gap:var(--space-3);align-items:center;}
    .logo{
      width:2.5rem;
      height:2.5rem;
      border-radius:var(--radius-lg);
      background:var(--color-surface);
      display:grid;
      place-items:center;
      border:1px solid color-mix(in srgb,var(--color-text) 15%,transparent);
      box-shadow:var(--shadow-sm);
      color:var(--color-primary);
    }
    .brand h1{
      margin:0;
      font-size:var(--text-lg);
      line-height:1.1;
    }
    .brand p{
      margin:0;
      color:var(--color-text-muted);
      font-size:var(--text-sm);
    }

    .theme-toggle,.btn{
      min-height:44px;
      border-radius:var(--radius-md);
      border:1px solid transparent;
      cursor:pointer;
      transition:all var(--transition);
    }
    .theme-toggle{
      min-width:44px;
      background:var(--color-surface);
      color:var(--color-text);
      border-color:color-mix(in srgb,var(--color-text) 15%,transparent);
    }

    .panel{
      background:color-mix(in srgb,var(--color-surface) 85%,transparent);
      backdrop-filter:blur(12px);
      border-radius:var(--radius-xl);
      border:1px solid color-mix(in srgb,var(--color-border) 90%,transparent);
      box-shadow:var(--shadow-md);
    }

    .hero{padding:var(--space-6);margin-bottom:var(--space-6);}
    .hero-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:var(--space-6);}

    .eyebrow{
      display:inline-flex;
      padding:var(--space-2) var(--space-3);
      border-radius:var(--radius-full);
      background:var(--color-primary-highlight);
      color:var(--color-primary);
      font-size:var(--text-xs);
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.08em;
      margin-bottom:var(--space-4);
    }

    .hero h2{
      margin:0 0 var(--space-3);
      font-size:var(--text-xl);
      line-height:1.05;
      max-width:20ch;
    }
    .hero p{
      margin:0;
      color:var(--color-text-muted);
      max-width:56ch;
    }

    .meta{display:grid;gap:var(--space-4);}
    .meta-card{
      padding:var(--space-4);
      background:var(--color-surface-2);
      border-radius:var(--radius-lg);
      border:1px solid color-mix(in srgb,var(--color-border) 90%,transparent);
    }
    .meta-card span{
      display:block;
      font-size:var(--text-xs);
      color:var(--color-text-faint);
      text-transform:uppercase;
      letter-spacing:.08em;
    }
    .meta-card strong{
      display:block;
      margin-top:var(--space-2);
    }

    .week-nav{
      display:flex;
      justify-content:flex-start;
      gap:var(--space-4);
      flex-wrap:wrap;
      margin-bottom:var(--space-5);
      align-items:center;
    }
    .week-actions{display:flex;gap:var(--space-3);flex-wrap:wrap;}

    .btn{
      padding:0 var(--space-5);
      font-weight:700;
    }
    .btn-secondary{
      background:var(--color-surface);
      color:var(--color-text);
      border-color:color-mix(in srgb,var(--color-text) 18%,transparent);
    }
    .btn-secondary:hover{transform:translateY(-1px);}
    .btn:disabled{opacity:0.6;cursor:wait;transform:none;}

    .toolbar{margin-bottom:var(--space-4);}
    .search-wrap{position:relative;max-width:420px;}
    .search-wrap input{
      width:100%;
      min-height:48px;
      padding:0 var(--space-4) 0 2.8rem;
      border-radius:var(--radius-md);
      border:1px solid var(--color-border);
      background:var(--color-surface-2);
      color:var(--color-text);
    }
    .search-icon{
      position:absolute;
      left:.9rem;
      top:50%;
      transform:translateY(-50%);
      color:var(--color-text-faint);
    }

    .status{
      margin-bottom:var(--space-4);
      padding:var(--space-3) var(--space-4);
      border-radius:var(--radius-lg);
      background:var(--color-surface-2);
      border:1px solid color-mix(in srgb,var(--color-border) 90%,transparent);
      color:var(--color-text-muted);
      font-size:var(--text-sm);
    }

    .schedule{display:grid;gap:var(--space-4);}
    .day-card{
      padding:var(--space-5);
      background:var(--color-surface);
      border-radius:var(--radius-xl);
      border:1px solid color-mix(in srgb,var(--color-border) 90%,transparent);
    }
    .day-head{
      display:flex;
      justify-content:space-between;
      gap:var(--space-4);
      flex-wrap:wrap;
      margin-bottom:var(--space-4);
      padding-bottom:var(--space-3);
      border-bottom:1px solid var(--color-divider);
    }
    .day-head h3{
      margin:0;
      font-size:var(--text-lg);
    }
    .day-head span{
      color:var(--color-text-muted);
      font-size:var(--text-sm);
    }
    .lesson-list{display:grid;gap:var(--space-3);}
    .lesson{
      display:grid;
      grid-template-columns:140px 1fr 200px;
      gap:var(--space-4);
      align-items:center;
      padding:var(--space-4);
      border-radius:var(--radius-lg);
      background:var(--color-surface-2);
      border:1px solid color-mix(in srgb,var(--color-border) 90%,transparent);
    }
    .time{font-weight:700;color:var(--color-primary);}
    .name{font-weight:700;}
    .room{text-align:right;color:var(--color-text-muted);}

    .cancelled{
      border-color:color-mix(in srgb,var(--color-error) 45%,transparent);
      background:color-mix(in srgb,var(--color-error) 14%,var(--color-surface-2));
    }
    .cancelled .name::after{
      content:"Annullata";
      margin-left:.35rem;
      font-size:var(--text-xs);
      color:var(--color-error);
      background:color-mix(in srgb,var(--color-error) 30%,transparent);
      padding:.15rem .5rem;
      border-radius:var(--radius-full);
      vertical-align:middle;
    }

    .empty{
      padding:var(--space-8);
      text-align:center;
      color:var(--color-text-muted);
      background:var(--color-surface);
      border-radius:var(--radius-xl);
      border:1px dashed color-mix(in srgb,var(--color-border) 90%,transparent);
    }

    @media (max-width:900px){
      .hero-grid,.lesson{grid-template-columns:1fr;}
      .room{text-align:left;}
    }
    @media (max-width:640px){
      .app{padding:var(--space-4);}
      .hero{padding:var(--space-4);}
      .week-actions .btn{width:100%;}
      .week-actions{width:100%;}
      .search-wrap{max-width:none;}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3.5" y="5" width="17" height="15" rx="3"></rect>
            <path d="M8 3.5v4"></path>
            <path d="M16 3.5v4"></path>
            <path d="M3.5 9.5h17"></path>
            <path d="M8 13h3"></path>
            <path d="M13 13h3"></path>
            <path d="M8 16.5h8"></path>
          </svg>
        </div>
        <div>
          <h1>Artificial Intelligence</h1>
          <p>Second semester</p>
        </div>
      </div>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Passa alla modalità chiara">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </header>

    <main>
      <section class="hero panel">
        <div class="hero-grid">
          <div>
            <div class="eyebrow">Caricamento live da UniMiB</div>
            <h2 id="courseTitle">Orario del corso Artificial Intelligence</h2>
            <!--<p id="courseSubtitle">
              Ogni volta che apri questa pagina, l'orario viene ricaricato dal portale EasyCourse per la settimana corrente.
              Puoi spostarti alla settimana precedente o successiva con un clic.
            </p>-->
          </div>
          <div class="meta">
            <article class="meta-card">
              <span>Settimana visualizzata</span>
              <strong id="weekLabel">—</strong>
            </article>
            <article class="meta-card">
              <span>Lezioni visibili</span>
              <strong id="lessonCount">0</strong>
            </article>
          </div>
        </div>
      </section>

      <section>
        <div class="week-nav">
          <div class="week-actions">
            <button class="btn btn-secondary" type="button" id="prevWeekBtn">← Settimana precedente</button>
            <button class="btn btn-secondary" type="button" id="todayWeekBtn">Settimana corrente</button>
            <button class="btn btn-secondary" type="button" id="nextWeekBtn">Settimana successiva →</button>
          </div>
        </div>
      </section>

      <section class="toolbar" aria-label="Ricerca lezione">
        <div class="search-wrap">
          <span class="search-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path>
            </svg>
          </span>
          <input id="searchLesson" type="search" placeholder="Filtra per nome lezione">
        </div>
      </section>

      <div class="status" id="statusBar">In attesa di caricare l'orario…</div>

      <section class="schedule" id="scheduleContainer" aria-live="polite">
        <div class="empty">Caricamento in corso…</div>
      </section>
    </main>
  </div>

  <script>
    const state = {
      lessons: [],
      meta: { courseTitle: '', weekLabel: '', updatedAt: '', courseCode: 'E311PV' },
      currentDate: null,
      loading: false,
    };
    const dayMap = ['lunedì','martedì','mercoledì','giovedì','venerdì','sabato','domenica'];

    const els = {
      prevWeekBtn: document.getElementById('prevWeekBtn'),
      todayWeekBtn: document.getElementById('todayWeekBtn'),
      nextWeekBtn: document.getElementById('nextWeekBtn'),
      searchLesson: document.getElementById('searchLesson'),
      scheduleContainer: document.getElementById('scheduleContainer'),
      courseTitle: document.getElementById('courseTitle'),
      courseSubtitle: document.getElementById('courseSubtitle'),
      weekLabel: document.getElementById('weekLabel'),
      lessonCount: document.getElementById('lessonCount'),
      statusBar: document.getElementById('statusBar'),
      themeToggle: document.querySelector('[data-theme-toggle]'),
    };

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      els.themeToggle.setAttribute('aria-label', theme === 'light-ui'
        ? 'Passa alla modalità scura'
        : 'Passa alla modalità chiara');
    }

    setTheme('default');
    els.themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme') || 'default';
      setTheme(current === 'default' ? 'light-ui' : 'default');
    });

    function startOfWeek(date) {
      const d = new Date(date);
      const day = d.getDay(); // dom=0, lun=1
      const diff = day === 0 ? -6 : 1 - day;
      d.setHours(0,0,0,0);
      d.setDate(d.getDate() + diff);
      return d;
    }
    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }
    function formatDateForApi(date) {
      const dd = String(date.getDate()).padStart(2,'0');
      const mm = String(date.getMonth()+1).padStart(2,'0');
      const yyyy = date.getFullYear();
      return `${dd}-${mm}-${yyyy}`;
    }

    function escapeHtml(v) {
      return v
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/\"/g,'&quot;')
        .replace(/'/g,'&#039;');
    }
    function capitalize(v) { return v.charAt(0).toUpperCase() + v.slice(1); }

    function setLoading(loading, message) {
      state.loading = loading;
      els.prevWeekBtn.disabled = loading;
      els.todayWeekBtn.disabled = loading;
      els.nextWeekBtn.disabled = loading;
      if (message) els.statusBar.textContent = message;
    }

    async function loadWeek(date) {
      const monday = startOfWeek(date);
      state.currentDate = monday;
      const dateStr = formatDateForApi(monday);
      setLoading(true, `Caricamento settimana del ${dateStr}…`);

      try {
        const res = await fetch(`/api/orario?date=${encodeURIComponent(dateStr)}`);
        if (!res.ok) throw new Error('API error ' + res.status);
        const data = await res.json();

        state.meta.courseTitle = data.course_title;
        state.meta.weekLabel = data.week_label;
        state.meta.updatedAt = data.updated_at || 'Non disponibile';
        state.meta.courseCode = data.course_code || 'E311PV';
        state.lessons = data.lessons || [];

        render();
        els.statusBar.textContent = `Orario caricato correttamente per la settimana del ${state.meta.weekLabel}.`;
      } catch (err) {
        console.error(err);
        state.lessons = [];
        render();
        els.statusBar.textContent = 'Errore nel contattare il backend FastAPI o EasyCourse.';
      } finally {
        setLoading(false);
      }
    }

    function render() {
      const filter = els.searchLesson.value.trim().toLowerCase();

      const filtered = state.lessons.filter(item =>
        item.name.toLowerCase().includes(filter)
      );

      els.courseTitle.textContent = state.meta.courseTitle || 'Orario del corso Artificial Intelligence';
      /*els.courseSubtitle.textContent =
        'Vista semplificata con solo nome lezione, orario e aula, aggiornata live dal portale EasyCourse.';*/
      els.weekLabel.textContent = state.meta.weekLabel || '—';
      els.lessonCount.textContent = String(filtered.length);

      if (!filtered.length) {
        els.scheduleContainer.innerHTML =
          '<div class="empty">Nessuna lezione trovata per la settimana selezionata.</div>';
        return;
      }

      const grouped = dayMap
        .map(day => ({ day, items: filtered.filter(item => item.day === day) }))
        .filter(group => group.items.length);

      els.scheduleContainer.innerHTML = grouped.map(group => `
        <article class="day-card">
          <div class="day-head">
            <h3>${capitalize(group.day)}</h3>
            <span>${group.items[0].date}</span>
          </div>
          <div class="lesson-list">
            ${group.items.map(item => `
              <div class="lesson ${item.cancelled ? 'cancelled' : ''}">
                <div class="time">${item.start} - ${item.end}</div>
                <div class="name">${escapeHtml(item.name)}</div>
                <div class="room">${escapeHtml(item.room)}</div>
              </div>
            `).join('')}
          </div>
        </article>
      `).join('');
    }

    els.prevWeekBtn.addEventListener('click', () => {
      if (!state.currentDate) return;
      const newDate = addDays(state.currentDate, -7);
      loadWeek(newDate);
    });

    els.nextWeekBtn.addEventListener('click', () => {
      if (!state.currentDate) return;
      const newDate = addDays(state.currentDate, 7);
      loadWeek(newDate);
    });

    els.todayWeekBtn.addEventListener('click', () => {
      loadWeek(new Date());
    });

    els.searchLesson.addEventListener('input', render);

    // all'avvio: settimana corrente
    loadWeek(new Date());
  </script>
</body>
</html>
